<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Perch · Call Cockpit — Procore 100</title>
<style>
:root{
  --bg:#0a0d13; --panel:#121722; --panel2:#161c29; --panel3:#1b2231;
  --edge:#242d3e; --edge2:#2f3a4f;
  --ink:#e7edf5; --ink2:#9fb0c6; --ink3:#6b7a91;
  --accent:#5b9dff; --accent2:#3fb98a; --gold:#e0a24e;
  --gc:#5b9dff; --sub:#c58af0;
  --ok:#3fb98a; --warn:#e0a24e; --bad:#e5686b; --slate:#7c8aa3; --info:#4bb3d4; --violet:#a98bec;
  --shadow:0 8px 30px rgba(0,0,0,.45);
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{background:var(--bg);color:var(--ink);font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,sans-serif;
  -webkit-font-smoothing:antialiased;overflow:hidden}
.serif{font-family:Georgia,"Times New Roman",serif}
button{font-family:inherit;cursor:pointer}
a{color:var(--accent);text-decoration:none}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:#26314a;border-radius:8px;border:2px solid var(--bg)}

/* ---- top bar ---- */
.topbar{height:52px;display:flex;align-items:center;gap:18px;padding:0 18px;border-bottom:1px solid var(--edge);
  background:linear-gradient(180deg,#121722,#0d1119)}
.brand{display:flex;align-items:center;gap:10px;font-weight:700;letter-spacing:.2px}
.brand .dot{width:10px;height:10px;border-radius:50%;background:var(--accent2);box-shadow:0 0 12px var(--accent2)}
.brand small{color:var(--ink3);font-weight:500}
.stats{display:flex;gap:16px;margin-left:6px}
.stat{display:flex;flex-direction:column;line-height:1.1}
.stat b{font-size:15px}.stat span{font-size:10px;color:var(--ink3);text-transform:uppercase;letter-spacing:.6px}
.topbar .spacer{flex:1}
.tbtn{background:var(--panel3);border:1px solid var(--edge2);color:var(--ink2);border-radius:8px;padding:7px 12px;font-size:12px;font-weight:600}
.tbtn:hover{border-color:var(--accent);color:var(--ink)}
.tbtn.primary{background:var(--accent);border-color:var(--accent);color:#06101f}

/* ---- layout ---- */
.app{display:grid;grid-template-columns:280px 1fr 360px;height:calc(100% - 52px)}
.col{overflow-y:auto;height:100%}
.rail{background:var(--panel);border-right:1px solid var(--edge)}
.right{background:var(--panel);border-left:1px solid var(--edge)}
.center{padding:20px 24px 60px}

/* ---- queue ---- */
.qhead{position:sticky;top:0;background:var(--panel);padding:12px 12px 8px;border-bottom:1px solid var(--edge);z-index:2}
.search{width:100%;background:var(--panel3);border:1px solid var(--edge2);color:var(--ink);border-radius:8px;padding:8px 10px;font-size:13px}
.search::placeholder{color:var(--ink3)}
.chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.chip{font-size:11px;padding:3px 9px;border-radius:20px;border:1px solid var(--edge2);color:var(--ink2);background:transparent}
.chip.on{background:var(--accent);border-color:var(--accent);color:#06101f;font-weight:600}
.qlist{padding:6px}
.qi{display:flex;gap:9px;align-items:center;padding:9px 10px;border-radius:9px;border:1px solid transparent;cursor:pointer}
.qi:hover{background:var(--panel2)}
.qi.sel{background:var(--panel3);border-color:var(--accent)}
.qrank{font-size:11px;color:var(--ink3);width:22px;text-align:right;font-variant-numeric:tabular-nums}
.qmid{flex:1;min-width:0}
.qname{font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.qmeta{font-size:11px;color:var(--ink3);display:flex;gap:6px;align-items:center}
.qdot{width:8px;height:8px;border-radius:50%;background:#33405a;flex:none}
.badge{font-size:10px;font-weight:700;padding:1px 6px;border-radius:5px;letter-spacing:.3px}
.b-gc{background:rgba(91,157,255,.16);color:var(--gc)}
.b-sub{background:rgba(197,138,240,.16);color:var(--sub)}
.b-size{background:rgba(224,162,78,.14);color:var(--gold)}
.b-strong{background:rgba(63,185,138,.18);color:var(--ok)}
.b-mod{background:rgba(224,162,78,.16);color:var(--gold)}
.fitbadge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:6px;letter-spacing:.3px}
.fit-strong{background:rgba(63,185,138,.16);color:var(--ok);border:1px solid rgba(63,185,138,.4)}
.fit-moderate{background:rgba(224,162,78,.14);color:var(--gold);border:1px solid rgba(224,162,78,.4)}

/* ---- profile center ---- */
.phdr{display:flex;align-items:flex-start;gap:16px;flex-wrap:wrap}
.pname{font-size:30px;font-weight:600;line-height:1.05}
.psub{color:var(--ink2);margin-top:4px;font-size:13px}
.pscore{margin-left:auto;text-align:center;background:var(--panel3);border:1px solid var(--edge2);border-radius:12px;padding:8px 14px}
.pscore b{font-size:22px;color:var(--accent2)}.pscore span{display:block;font-size:9px;color:var(--ink3);letter-spacing:1px}
.routing{display:flex;gap:8px;align-items:center;margin-top:12px;flex-wrap:wrap}
.sel-pill{background:var(--panel3);border:1px solid var(--edge2);color:var(--ink);border-radius:8px;padding:6px 8px;font-size:12px;font-weight:600}
.phone{font-size:20px;font-weight:700;letter-spacing:.4px;color:var(--ink)}
.phone a{color:var(--ink)}
.mini{font-size:11px;color:var(--ink3);background:var(--panel3);border:1px solid var(--edge2);border-radius:6px;padding:4px 8px}
.mini:hover{color:var(--ink);border-color:var(--accent)}

.enrich{display:flex;gap:7px;flex-wrap:wrap;margin:16px 0 4px}
.ebtn{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600;padding:7px 11px;border-radius:8px;
  background:var(--panel2);border:1px solid var(--edge2);color:var(--ink2)}
.ebtn:hover{border-color:var(--accent);color:var(--ink)}
.ebtn.confirmed{border-color:rgba(63,185,138,.5);color:var(--ink)}
.ebtn .ico{width:14px;height:14px;opacity:.9}
.epill{font-size:10px;font-weight:700;letter-spacing:.4px;padding:3px 9px;border-radius:20px;background:rgba(63,185,138,.14);color:var(--accent2);border:1px solid rgba(63,185,138,.4);text-transform:uppercase}
.epill.dim{background:transparent;color:var(--ink3);border-color:var(--edge2)}

.card{background:var(--panel2);border:1px solid var(--edge);border-radius:12px;padding:16px 18px;margin-top:16px}
.card h3{margin:0 0 10px;font-size:12px;text-transform:uppercase;letter-spacing:1.2px;color:var(--ink3);font-weight:700}
.tldr{font-size:15px;line-height:1.6}
.desc{color:var(--ink2);font-size:13px;margin-top:8px;font-style:italic}

.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:6px}
.kv{background:var(--panel3);border:1px solid var(--edge);border-radius:9px;padding:10px 12px}
.kv b{font-size:18px;display:block}.kv span{font-size:10px;color:var(--ink3);text-transform:uppercase;letter-spacing:.6px}
.tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
.tag{font-size:11px;padding:3px 9px;border-radius:20px;background:var(--panel3);border:1px solid var(--edge);color:var(--ink2)}

/* ---- script ---- */
.scriptcard{border-left:3px solid var(--accent)}
.toggle{display:inline-flex;background:var(--panel3);border:1px solid var(--edge2);border-radius:8px;overflow:hidden}
.toggle button{background:transparent;border:0;color:var(--ink2);padding:6px 12px;font-size:12px;font-weight:600}
.toggle button.on{background:var(--accent);color:#06101f}
.quote{background:var(--panel3);border:1px solid var(--edge);border-radius:10px;padding:12px 14px;margin:10px 0;font-size:14px;line-height:1.55}
.quote.opener{border-left:3px solid var(--accent2)}
.qnum{display:flex;gap:10px;align-items:baseline;margin-top:14px}
.qnum .n{width:24px;height:24px;flex:none;border-radius:50%;background:var(--accent);color:#06101f;font-weight:800;font-size:12px;display:flex;align-items:center;justify-content:center}
.qnum .qq{font-size:15px;font-weight:600;line-height:1.45}
.why{color:var(--ink3);font-size:12px;margin:4px 0 0 34px}
.fups{margin:6px 0 0 34px;padding:0;list-style:none}
.fups li{color:var(--ink2);font-size:12.5px;padding:2px 0 2px 14px;position:relative}
.fups li:before{content:"→";position:absolute;left:0;color:var(--accent)}
.sizebox{background:var(--panel3);border:1px solid var(--edge);border-radius:10px;padding:12px 14px;margin-top:12px}
.wedge{margin-top:10px;padding:9px 12px;background:rgba(63,185,138,.09);border:1px solid rgba(63,185,138,.3);border-radius:8px;color:#bfeeda;font-size:13px}
.acc{border-top:1px solid var(--edge);margin-top:6px}
.acc summary{cursor:pointer;padding:9px 0;font-size:13px;font-weight:600;color:var(--ink2);list-style:none;display:flex;justify-content:space-between}
.acc summary:hover{color:var(--ink)}
.acc summary::-webkit-details-marker{display:none}
.acc summary:after{content:"+";color:var(--ink3)}
.acc[open] summary:after{content:"–"}
.acc .body{padding:0 0 12px;font-size:13px;color:var(--ink2)}
.obj{margin-bottom:12px}.obj .t{font-weight:600;color:var(--ink)}
.obj .r{color:var(--ink2);margin-top:3px;padding-left:12px;border-left:2px solid var(--edge2)}

/* ---- right / disposition ---- */
.rpad{padding:16px}
.sechead{font-size:11px;text-transform:uppercase;letter-spacing:1.2px;color:var(--ink3);font-weight:700;margin:4px 0 9px}
.outcomes{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.oc{padding:10px 8px;border-radius:9px;border:1px solid var(--edge2);background:var(--panel2);color:var(--ink);font-size:12px;font-weight:600;text-align:left;display:flex;flex-direction:column;gap:2px}
.oc small{font-weight:500;color:var(--ink3);font-size:10px}
.oc:hover{border-color:var(--ink2)}
.oc.on{box-shadow:inset 0 0 0 2px currentColor}
.oc .swatch{width:9px;height:9px;border-radius:50%}
.field{margin-top:11px}
.field label{display:block;font-size:11px;color:var(--ink3);margin-bottom:4px;font-weight:600}
.inp,.sel,.ta{width:100%;background:var(--panel3);border:1px solid var(--edge2);color:var(--ink);border-radius:8px;padding:8px 10px;font-size:13px;font-family:inherit}
.ta{resize:vertical;min-height:54px}
.gold-ta{border-color:rgba(224,162,78,.45)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.multi{display:flex;flex-wrap:wrap;gap:5px}
.mtog{font-size:11px;padding:4px 9px;border-radius:16px;border:1px solid var(--edge2);color:var(--ink2);background:transparent}
.mtog.on{background:var(--accent2);border-color:var(--accent2);color:#04140e;font-weight:600}
.stars{display:flex;gap:4px}
.star{font-size:20px;cursor:pointer;color:#3b465c}
.star.on{color:var(--gold)}
.savebtn{width:100%;margin-top:14px;background:var(--accent2);border:0;color:#04140e;font-weight:800;padding:11px;border-radius:10px;font-size:14px}
.savebtn:hover{filter:brightness(1.08)}
.hist{margin-top:16px}
.hitem{background:var(--panel2);border:1px solid var(--edge);border-radius:9px;padding:9px 11px;margin-top:7px;font-size:12px}
.hitem .top{display:flex;justify-content:space-between;color:var(--ink3);font-size:11px}
.pill{font-size:10px;font-weight:700;padding:2px 7px;border-radius:5px}
.empty{color:var(--ink3);text-align:center;padding:40px 20px;font-size:13px}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--accent2);color:#04140e;font-weight:700;
  padding:10px 18px;border-radius:10px;box-shadow:var(--shadow);opacity:0;transition:.25s;pointer-events:none;z-index:50}
.toast.show{opacity:1}
.hint{color:var(--ink3);font-size:11px;margin-top:3px}
</style>
</head>
<body>
<div class="topbar">
  <div class="brand"><span class="dot"></span> Perch <small>· Call Cockpit</small></div>
  <div class="stats" id="globalStats"></div>
  <div class="spacer"></div>
  <span id="syncBadge" onclick="askSyncKey()" style="cursor:pointer;font-size:11px;margin-right:10px;user-select:none">☁ local only</span>
  <button class="tbtn" onclick="exportCSV()">Export CSV</button>
  <button class="tbtn" onclick="resetAll()">Reset</button>
</div>

<div class="app">
  <!-- QUEUE -->
  <div class="col rail">
    <div class="qhead">
      <input class="search" id="search" placeholder="Search companies…" oninput="render()"/>
      <div class="chips" id="chips"></div>
    </div>
    <div class="qlist" id="qlist"></div>
  </div>

  <!-- PROFILE + SCRIPT -->
  <div class="col center" id="center"><div class="empty">Select a company to begin.</div></div>

  <!-- DISPOSITION -->
  <div class="col right"><div class="rpad" id="right"><div class="empty">No call in progress.</div></div></div>
</div>
<div class="toast" id="toast"></div>

/* ===================== CLOUD SYNC (Pages Function + KV) =====================
   localStorage = offline cache; the KV blob behind /api/log = source of truth.
   Boot: pull cloud store, MERGE with local (calls unioned by ts+company —
   crash-safe, multi-device-safe), push merged result back. Save: debounced push.
   Sync key is asked once per device and kept in localStorage. */
const SYNCK = 'perch-cockpit-sync-key';
let syncKey = localStorage.getItem(SYNCK) || '';
let syncState = 'off'; // off | ok | err
function setSyncBadge(){
  const el=document.getElementById('syncBadge'); if(!el) return;
  el.textContent = syncState==='ok'?('☁ synced'+(cloudCalls!=null?` · ${cloudCalls} calls`:'')):syncState==='err'?'☁ SYNC ERROR':'☁ local only';

/* TOMB: "__deleted" {ts:true} map at the top of the store. Union-only merge
   means a plain delete resurrects from any other device — a tombstone is the
   only delete that sticks. Tombstone maps merge on pull; tombstoned calls are
   physically dropped here and filtered everywhere via liveCalls(). */
const TOMB='__deleted';
function mergeStores(a,b){ // union of calls per company by (ts), overrides: a<-b
  const out=JSON.parse(JSON.stringify(a||{}));
  out[TOMB]=Object.assign({},(a||{})[TOMB]||{},(b||{})[TOMB]||{});
  Object.keys(b||{}).forEach(k=>{
    if(k===TOMB) return;
    const src=b[k]||{}, dst=out[k]=out[k]||{calls:[]};
    const byTs=new Map((dst.calls||[]).map(c=>[c.ts+'',c]));
    (src.calls||[]).forEach(c=>{
      const ex=byTs.get(c.ts+'');
      if(!ex){ (dst.calls=dst.calls||[]).push(c); byTs.set(c.ts+'',c); }
      // same call on both sides: higher rev wins (field edits/enrichment propagate
      // instead of being clobbered by a stale device's copy); granola carries either way
      else if((c.rev||0)>(ex.rev||0)){ Object.assign(ex,c); }
      else if(c.granola&&!ex.granola){ ex.granola=c.granola; }
    });
    (dst.calls||[]).sort((x,y)=>x.ts-y.ts);
    if(src.override) dst.override=Object.assign({},src.override,dst.override||{});
  });
  // tombstoned calls are dead on every device — drop them physically
  Object.keys(out).forEach(k=>{
    if(k===TOMB||!out[k]||!out[k].calls) return;
    out[k].calls=out[k].calls.filter(c=>!out[TOMB][c.ts]);
  });
  return out;
}
let pushTimer=null, dirty=false, cloudCalls=null;
async function flushCloud(useBeacon){
  if(!syncKey||!dirty) return false;
  try{
    const r=await fetch('/api/log',{method:'PUT',keepalive:!!useBeacon,
      headers:{'x-sync-key':syncKey,'content-type':'application/json'},body:JSON.stringify(store)});
    syncState=r.ok?'ok':'err'; if(r.ok)dirty=false;
    if(r.ok&&!useBeacon){try{const j=await r.json(); if(typeof j.liveCalls==='number')cloudCalls=j.liveCalls;}catch(e){}}
  }catch(e){syncState='err';}
  setSyncBadge();
  return syncState==='ok';
}
function pushCloud(){
  if(!syncKey) return;
  dirty=true;
  clearTimeout(pushTimer);
  pushTimer=setTimeout(()=>flushCloud(false),300);
}
/* never lose a just-logged call to a closing tab: flush synchronously-ish */
window.addEventListener('pagehide',()=>flushCloud(true));

});
async function pullCloud(quiet){
  if(!syncKey) return;
  try{
    const r=await fetch('/api/log',{headers:{'x-sync-key':syncKey}});
    if(!r.ok){syncState='err';setSyncBadge();if(!quiet)toast('☁ sync error — check the sync key (click the ☁ badge)');return;}
    const cloud=await r.json();
    store=mergeStores(store,cloud);

    syncState='ok'; setSyncBadge(); dirty=true; flushCloud(false);

  }catch(e){syncState='err';setSyncBadge();if(!quiet)toast('☁ sync error — network');}
}

function passFilter(c){
  const s=document.getElementById('search').value.trim().toLowerCase();
  if(s && !(c.company.toLowerCase().includes(s)||c.city.toLowerCase().includes(s)||(c.trades.join(' ').toLowerCase().includes(s)))) return false;
  if(filter.icp!=='all' && effIcp(c)!==filter.icp) return false;
  if(filter.size!=='all' && effSize(c)!==filter.size) return false;
  const lo=lastOutcome(c.company);
  if(filter.status==='uncalled' && lo) return false;
  if(filter.status==='called' && !lo) return false;
  if(filter.status==='productive' && lo!=='productive') return false;
  if(filter.fit!=='all' && (c.fitTier||'')!==filter.fit) return false;
  return true;
}

  if(web) L.push(['Website',web,true]);
  L.push(['LinkedIn', e.linkedin||`https://www.linkedin.com/search/results/companies/?keywords=${q(name)}`, !!e.linkedin]);
  L.push(['Facebook', e.facebook||`https://www.facebook.com/search/top?q=${q(name+' Utah')}`, !!e.facebook]);
  if(e.instagram) L.push(['Instagram', e.instagram, true]);
  L.push(['Google', `https://www.google.com/search?q=${q(name+' '+c.city+' Utah construction')}`, false]);
  L.push(['Maps', `https://www.google.com/maps/search/?api=1&query=${q(name+' '+c.city+' UT')}`, false]);
  if(c.profileUrl) L.push(['Procore', c.profileUrl, true]);
  return L;
}
function tldr(c){
  const e=c.enrich||{};
  if(e.summary){ // grounded, web-researched summary
    return esc(e.summary).replace(esc(c.company), '<b>'+esc(c.company)+'</b>');
  }
  const icp=effIcp(c)==='GC'?'general contractor':'specialty subcontractor';
  let s=`<b>${esc(c.company)}</b> is a <b>${effSize(c)}</b> ${icp} based in ${esc(c.city)}${c.county?', '+esc(c.county)+' County':''}. `;
  if(c.totalProjects!=null) s+=`Active on Procore with <b>${c.totalProjects}</b> tracked projects${c.activeProjects!=null?` (<b>${c.activeProjects}</b> currently active)`:''}, ~${c.avgSize} average project value. `;
  if(c.trades.length) s+=`Specializes in ${c.trades.slice(0,3).join(', ')}. `;
  if(c.sectors.length) s+=`Serves ${c.sectors.slice(0,3).join(', ')}.`;
  return s;
}
function enrichMeta(c){
  const e=c.enrich; if(!e) return '';
  const bits=[];
  if(e.founded) bits.push(`Founded ${esc(e.founded)}`);
  if(e.employees) bits.push(`~${esc(e.employees)} employees`);
  if(!bits.length) return '';
  return `<div style="font-size:12px;color:var(--ink3);margin-top:8px">${bits.join('  ·  ')}</div>`;
}

/* ============================ PROFILE + SCRIPT ============================ */
function select(key){
  selKey=key; draft={};
  render();
  const c=DATA.find(x=>x.company===key);
  renderCenter(c); renderRight(c);
  document.getElementById('center').scrollTop=0;
}
function renderCenter(c){
  const icp=effIcp(c), size=effSize(c), sc=PB[icp];
  const el=socialLinks(c).map(([lab,href,ok])=>`<a class="ebtn ${ok?'confirmed':''}" href="${href}" target="_blank" rel="noopener">${ok?'●':'⌕'} ${lab}</a>`).join('');
  const e=c.enrich||null;
  const spec=(e&&e.specialties&&e.specialties.length)? `<div class="tags">${e.specialties.map(t=>`<span class="tag" style="border-color:var(--edge2);color:var(--ink)">${esc(t)}</span>`).join('')}</div>`:'';
  const enrichedPill=e? `<span class="epill">✓ enriched${e.confidence?` · ${esc(e.confidence)}`:''}</span>` : `<span class="epill dim">Procore data only</span>`;
  const top3=sc.top3.map((it,i)=>`
    <div class="qnum"><div class="n">${i+1}</div><div class="qq">${it.q}</div></div>
    <div class="why">${it.why}</div>
    <ul class="fups">${it.fups.map(f=>`<li>${f}</li>`).join('')}</ul>`).join('');
  const sz=sc.sizes[size];
  const objs=PB.objections.map(o=>`<div class="obj"><div class="t">${o.t}</div><div class="r">${o.r}</div></div>`).join('');

  document.getElementById('center').innerHTML=`
    <div class="phdr">
      <div>
        <div class="pname serif">${c.company}</div>
        <div class="psub">${c.companyType} · ${c.city}${c.county?', '+c.county+' Co.':''} · Rank #${c.rank}</div>
        ${c.fitTier?`<div style="margin-top:8px"><span class="fitbadge fit-${c.fitTier.toLowerCase()}">${c.fitTier} fit</span> <span style="color:var(--ink3);font-size:12px">${esc(c.fitReason||'')}</span></div>`:''}
      </div>
      <div class="pscore"><b>${c.score}</b><span>PERCH SCORE</span></div>
    </div>

    <div class="routing">
      <span class="phone">📞 <a href="tel:${(c.phone||'').replace(/[^0-9+]/g,'')}">${c.phone||'—'}</a></span>
      <button class="mini" onclick="copyPhone('${(c.phone||'').replace(/'/g,'')}')">copy</button>
      <span style="width:10px"></span>
      <span style="font-size:11px;color:var(--ink3)">SCRIPT</span>
      <select class="sel-pill" onchange="setOverride('icp',this.value)">
        ${['GC','Sub'].map(v=>`<option value="${v}" ${icp===v?'selected':''}>${PB[v].label}</option>`).join('')}
      </select>
      <select class="sel-pill" onchange="setOverride('size',this.value)">
        ${['small','medium','large'].map(v=>`<option value="${v}" ${size===v?'selected':''}>${v[0].toUpperCase()+v.slice(1)}</option>`).join('')}
      </select>
      <span class="hint">auto-routed — override anytime</span>
    </div>

    <div class="enrich">${el}</div>

    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center"><h3 style="margin:0">TL;DR</h3>${enrichedPill}</div>
      <div class="tldr" style="margin-top:10px">${tldr(c)}</div>
      ${enrichMeta(c)}
      ${spec}
      ${c.description?`<div class="desc">Procore: "${c.description}"</div>`:''}
      <div class="grid4" style="grid-template-columns:repeat(3,1fr);margin-top:14px">
        <div class="kv"><b>${c.totalProjects??'—'}</b><span>Total projects</span></div>
        <div class="kv"><b>${c.activeProjects??'—'}</b><span>Active now</span></div>
        <div class="kv"><b>${c.avgSize||'—'}</b><span>Avg job (bldg)</span></div>
      </div>
      ${c.trades.length?`<div class="tags">${c.trades.map(t=>`<span class="tag">${t}</span>`).join('')}</div>`:''}
      ${c.sectors.length?`<div class="tags">${c.sectors.map(t=>`<span class="tag" style="color:var(--ink3)">${t}</span>`).join('')}</div>`:''}
    </div>

    <div class="card scriptcard">
      <div style="display:flex;justify-content:space-between;align-items:center">

          <button class="on" onclick="setOpener('student',this)">Student</button>

        <ul class="fups" style="margin-left:0">${sz.ask.map(a=>`<li>${a}</li>`).join('')}</ul>
        <div style="font-size:12px;color:var(--ink3);margin-top:8px"><b>Listen for:</b> ${sz.listen.join(' · ')}</div>
        <div class="wedge">💡 Wedge: ${sz.wedge}</div>

        <div class="body"><div class="quote">${sc.one}</div></div></details>

      <details class="acc"><summary>If "is this sales?" / "send email"</summary><div class="body">
        <div class="obj"><div class="t">Is this sales?</div><div class="r">${PB.ifSales}</div></div>

}
let curOpener='student';
function setOpener(k,btn){curOpener=k;[...btn.parentNode.children].forEach(b=>b.classList.remove('on'));btn.classList.add('on');
  document.getElementById('openerText').textContent=PB.openers[k];}
function setOverride(k,v){
  const r=rec(selKey); r.override=r.override||{}; r.override[k]=v; save();
  const c=DATA.find(x=>x.company===selKey); render(); renderCenter(c); renderRight(c);
}
function copyPhone(p){navigator.clipboard.writeText(p);toast('Phone copied');}

/* ============================ DISPOSITION / CAPTURE ============================ */
function renderRight(c){
  const icp=effIcp(c);
  const oc=PB.outcomes.map(o=>`
    <button class="oc" style="color:${o.c}" data-k="${o.k}" onclick="pickOutcome('${o.k}',this)">
      <span style="display:flex;align-items:center;gap:6px"><span class="swatch" style="background:${o.c}"></span><span style="color:var(--ink)">${o.l}</span></span>
      <small>${o.d}</small></button>`).join('');
  const personas=PB.personas.map(p=>`<option>${p}</option>`).join('');
  const tools=PB.tools.map(t=>`<button class="mtog" data-tool="${t}" onclick="toggleTool(this)">${t}</button>`).join('');
  const wedges=PB.gtm[icp].map(w=>`<option>${w}</option>`).join('');
  const hist=liveCalls(c.company).slice().reverse().map(renderHItem).join('') || `<div class="hint">No calls logged yet.</div>`;

  document.getElementById('right').innerHTML=`
    <div class="sechead">Call outcome</div>
    <div class="outcomes" id="ocGrid">${oc}</div>

    <div class="sechead" style="margin-top:18px">Structured capture <span style="color:var(--ink3);text-transform:none;letter-spacing:0">→ feeds training data</span></div>
    <div class="row2">
      <div class="field"><label>Contact name</label><input class="inp" id="f_contact" placeholder="Who you reached"></div>
      <div class="field"><label>Title / role</label><input class="inp" id="f_title" placeholder="e.g. Estimator"></div>
    </div>
    <div class="field"><label>Persona</label><select class="sel" id="f_persona">${personas}</select></div>
    <div class="field"><label>Current tools (tap all mentioned)</label><div class="multi" id="f_tools">${tools}</div></div>
    <div class="field"><label>Objection raised</label><input class="inp" id="f_objection" placeholder="e.g. We already use BuildingConnected"></div>
    <div class="field"><label>Pain discovered</label><textarea class="ta" id="f_pain" placeholder="The workflow pain, in their words"></textarea></div>
    <div class="field"><label>Question that landed</label><input class="inp" id="f_question" placeholder="Which question opened them up"></div>
    <div class="field"><label>🏆 Golden quote (exact words)</label><textarea class="ta gold-ta" id="f_quote" placeholder="&quot;We still do that in Excel…&quot;"></textarea></div>
    <div class="row2">
      <div class="field"><label>Next step</label><input class="inp" id="f_next" placeholder="Callback / email / demo…"></div>
      <div class="field"><label>Wedge that resonated</label><select class="sel" id="f_wedge"><option value="">—</option>${wedges}</select></div>
    </div>
    <div class="field"><label>Interest</label><div class="stars" id="f_stars">${[1,2,3,4,5].map(n=>`<span class="star" data-n="${n}" onclick="setStars(${n})">★</span>`).join('')}</div></div>
    <div class="field"><label>Notes</label><textarea class="ta" id="f_notes" placeholder="Anything else worth remembering"></textarea></div>

    <button class="savebtn" onclick="saveCall()">✓ Log call</button>

  // draft autosave: anything typed survives re-renders, tab switches, reloads
  restoreDraft(c.company);
  const rp=document.getElementById('right');
  rp.oninput=stashDraft; rp.onchange=stashDraft;
}
/* ---- draft persistence (in-progress call notes are sacred) ---- */
const DRAFTK='perch-cockpit-draft';
const DRAFT_FIELDS=['f_contact','f_title','f_persona','f_objection','f_pain','f_question','f_quote','f_next','f_wedge','f_notes'];
function stashDraft(){
  if(!selKey) return;
  const d={company:selKey,outcome:draft.outcome||'',stars:draft.stars||0,
    tools:[...document.querySelectorAll('#f_tools .mtog.on')].map(b=>b.dataset.tool),f:{}};
  DRAFT_FIELDS.forEach(id=>{const e=document.getElementById(id);if(e)d.f[id]=e.value;});
  localStorage.setItem(DRAFTK,JSON.stringify(d));
}
function restoreDraft(company){
  try{
    const d=JSON.parse(localStorage.getItem(DRAFTK)||'null');
    if(!d||d.company!==company) return;
    Object.entries(d.f||{}).forEach(([id,v])=>{const e=document.getElementById(id);if(e&&v)e.value=v;});
    if(d.outcome&&!draft.outcome){draft.outcome=d.outcome;
      const b=document.querySelector(`.oc[data-k="${d.outcome}"]`);if(b)b.classList.add('on');}
    if(d.stars&&!draft.stars)setStars(d.stars);
    (d.tools||[]).forEach(t=>{const b=document.querySelector(`#f_tools .mtog[data-tool="${t}"]`);if(b)b.classList.add('on');});
  }catch(e){}
}
function clearDraft(){localStorage.removeItem(DRAFTK);}
function renderHItem(h){
  const oc=ocById(h.outcome)||{l:h.outcome,c:'var(--ink3)'};
  return `<div class="hitem"><div class="top"><span>${new Date(h.ts).toLocaleString()}</span>
    <span class="pill" style="background:${oc.c};color:#06101f">${oc.l}</span></div>
    ${h.contact?`<div style="margin-top:4px"><b>${h.contact}</b>${h.title?' · '+h.title:''}${h.persona&&h.persona!=='Unknown'?' · '+h.persona:''}</div>`:''}
    ${h.pain?`<div style="color:var(--ink2);margin-top:3px">${h.pain}</div>`:''}
    ${h.quote?`<div style="color:var(--gold);margin-top:3px">"${h.quote}"</div>`:''}
    ${h.next?`<div style="color:var(--ink3);margin-top:3px">→ ${h.next}</div>`:''}
    ${h.granola?`<div style="margin-top:7px;padding:7px 9px;background:rgba(150,125,255,.07);border-left:2px solid #8f7aff;border-radius:4px">
      <a href="${h.granola.url}" target="_blank" style="color:#ab99ff;font-weight:600;text-decoration:none;font-size:11px">📝 Granola notes · ${h.granola.title||''} ↗</a>
      ${h.granola.summary?`<div style="color:var(--ink2);margin-top:4px;white-space:pre-wrap;font-size:11px;line-height:1.45;max-height:130px;overflow:auto">${h.granola.summary.replace(/</g,'&lt;')}</div>`:''}</div>`:''}</div>`;
}
function pickOutcome(k,btn){draft.outcome=k;[...document.querySelectorAll('.oc')].forEach(b=>b.classList.remove('on'));btn.classList.add('on');stashDraft();}
function toggleTool(btn){btn.classList.toggle('on');stashDraft();}
function setStars(n){draft.stars=n;[...document.querySelectorAll('.star')].forEach(s=>s.classList.toggle('on', +s.dataset.n<=n));stashDraft();}
function val(id){const e=document.getElementById(id);return e?e.value.trim():'';}
function saveCall(){
  if(!selKey) return;
  if(!draft.outcome){toast('Pick an outcome first');return;}
  const c=DATA.find(x=>x.company===selKey);
  const tools=[...document.querySelectorAll('#f_tools .mtog.on')].map(b=>b.dataset.tool);
  const entry={
    ts:Date.now(), rev:1, outcome:draft.outcome,
    company:c.company, icp:effIcp(c), size:effSize(c), trade:(c.trades[0]||''),
    contact:val('f_contact'), title:val('f_title'), persona:val('f_persona'),
    tools, objection:val('f_objection'), pain:val('f_pain'), question:val('f_question'),
    quote:val('f_quote'), next:val('f_next'), wedge:val('f_wedge'),
    interest:draft.stars||'', notes:val('f_notes')
  };
  rec(c.company).calls.push(entry); save(); clearDraft();
  draft={}; render(); renderRight(c);
  // SERVER-CONFIRMED receipt: push immediately (no debounce) and report the
  // cloud's own liveCalls count back — or say loudly that it did NOT save.
  toast('Logging…');
  clearTimeout(pushTimer); dirty=true;
  flushCloud(false).then(ok=>{
    toast(ok?`✓ saved to cloud — ${cloudCalls!=null?cloudCalls+' calls total':'confirmed'}`
            :'⚠ logged on THIS DEVICE ONLY — cloud push failed (check ☁ badge)');
  });
}
function nextUncalled(){
  const c=DATA.find(x=>!lastOutcome(x.company));
  if(c) select(c.company); else toast('All 100 dialed 🎉');
}

/* ============================ EXPORT ============================ */
function download(name,text,type){const b=new Blob([text],{type});const a=document.createElement('a');
  a.href=URL.createObjectURL(b);a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),3000);}
function allCalls(){const out=[];companies().forEach(k=>{liveCalls(k).forEach(e=>out.push(e))});return out;}
function exportCSV(){
  const calls=allCalls(); if(!calls.length){toast('No calls to export');return;}
  const cols=['ts','company','icp','size','trade','outcome','contact','title','persona','tools','objection','pain','question','quote','next','wedge','interest','notes','granola'];
  const esc=v=>{v=(v==null?'':Array.isArray(v)?v.join('; '):String(v)).replace(/"/g,'""');return `"${v}"`;};
  const rows=[cols.join(',')].concat(calls.map(e=>cols.map(c=>c==='ts'?esc(new Date(e.ts).toISOString()):c==='granola'?esc(e.granola?e.granola.url:''):esc(e[c])).join(',')));
  download('perch_calls.csv',rows.join('\n'),'text/csv');toast('CSV exported');
}
function exportJSONL(){
  const calls=allCalls(); if(!calls.length){toast('No calls to export');return;}
  // training-ready structured examples (per discovery flywheel schema)
  const lines=calls.map(e=>JSON.stringify({
    company:e.company, companyType:e.icp, size:e.size, trade:e.trade, persona:e.persona,
    outcome:e.outcome, objection:e.objection, questionAsked:e.question,
    painDiscovered:e.pain, customerQuote:e.quote, currentTools:e.tools,
    recommendedFollowUp:e.next, gtmImplication:e.wedge, interest:e.interest, notes:e.notes,
    granolaNotes:(e.granola&&e.granola.summary)||'', granolaUrl:(e.granola&&e.granola.url)||'',
    capturedAt:new Date(e.ts).toISOString()
  }));
  download('perch_call_examples.jsonl',lines.join('\n'),'application/x-ndjson');toast('Training JSONL exported');
}
function resetAll(){
  if(!confirm('Clear ALL logged calls — on every synced device? (Tombstones the log globally; this cannot be undone from another device.)')) return;
  // tombstone every call so the delete survives union merges from other devices
  const t=tombs();
  companies().forEach(k=>{(store[k].calls||[]).forEach(c=>{t[c.ts]=true;});});
  store={[TOMB]:t}; // keep only the tombstones; overrides reset on this device
  save(); clearDraft(); draft={};
  selKey&&select(selKey); render();
  document.getElementById('right').innerHTML='<div class="empty">No call in progress.</div>';
}

function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),1600);}

/* ===================== GRANOLA SYNC (URL-hash import) =====================
   Open the cockpit with #gsync=<base64 JSON> and the payload merges into the
   call log: [{company, ts, granola:{id,title,url,summary}}]. Each item attaches
   to the company's call nearest in time that lacks granola notes. The hash is
   client-side only (never sent to the server) and is cleared after import. */
function gsyncImport(){
  const m=location.hash.match(/gsync=([^&]+)/); if(!m) return;
  try{
    const items=JSON.parse(decodeURIComponent(escape(atob(m[1]))));
    let n=0;
    items.forEach(it=>{
      const key=companies().find(k=>k.toLowerCase()===String(it.company||'').toLowerCase())
        || companies().find(k=>k.toLowerCase().includes(String(it.company||'').toLowerCase()));
      const live=key?liveCalls(key):[]; if(!live.length) return;
      let best=null,bd=Infinity;
      live.forEach(c=>{const d=Math.abs((it.ts||c.ts)-c.ts);if(!c.granola&&d<bd){bd=d;best=c;}});
      if(best){best.granola=it.granola;n++;}
    });
    if(n) save();
    history.replaceState(null,'',location.pathname+location.search);
    setTimeout(()=>{toast(n?`📝 Granola synced → ${n} call${n===1?'':'s'}`:'Granola sync: no matching calls');
      if(selKey){const c=DATA.find(x=>x.company===selKey); if(c) renderRight(c);}},350);
  }catch(e){console.warn('gsync failed',e);history.replaceState(null,'',location.pathname+location.search);}
}

/* init */
render();
gsyncImport();
setSyncBadge();
if(syncKey){ pullCloud(); }
else if(!localStorage.getItem(SYNCK+'-asked')){ localStorage.setItem(SYNCK+'-asked','1'); setTimeout(askSyncKey,600); }
